<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; }
        nav { background: #333; padding: 1rem; }
        nav a { color: #fff; padding: 1rem; text-decoration: none; }
        .content { padding: 2rem; }
        .tab { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<nav>
    <a href="#" onclick="showTab('customer')">Customer</a>
    <a href="#" onclick="showTab('attendant')">Attendant</a>
    <a href="#" onclick="showTab('admin')">Admin</a>
</nav>

<div class="content">
    <div id="customer" class="tab active">
        <h2>Customer Dashboard</h2>
        <p>Welcome to the Customer Dashboard.</p>
        <!-- Add Customer functionality here -->
    </div>
    
    <div id="attendant" class="tab">
        <h2>Attendant Dashboard</h2>
        <p>Welcome to the Attendant Dashboard.</p>
        <!-- Add Attendant functionality here -->
    </div>
    
    <div id="admin" class="tab">
        <h2>Admin Dashboard</h2>
        <p>Welcome to the Admin Dashboard.</p>
        <!-- Add Admin functionality here -->
    </div>
</div>

<script>
    function showTab(tabId) {
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.classList.remove('active');
        });
        document.getElementById(tabId).classList.add('active');
    }
    // Initialize to show customer tab
    showTab('customer');
</script>

</body>
</html>
